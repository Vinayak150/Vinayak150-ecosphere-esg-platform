[tool.ruff]
target-version = "py312"
line-length = 100
exclude = ["scripts"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]
ignore = ["B008", "N818"]

[tool.mypy]
python_version = "3.12"
files = ["app"]
exclude = [
    "app/tests/.*",
    "app/modules/.*/tests/.*",
    "scripts/.*",
]
ignore_missing_imports = true

# Meaningful checks for application code (without full strict mode).
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true
strict_equality = true

# FastAPI + SQLAlchemy projects commonly relax these globally.
disallow_untyped_defs = false
check_untyped_defs = false
disallow_incomplete_defs = false
disallow_untyped_decorators = false
disallow_any_generics = false

# Third-party / ORM patterns that need plugins or heavy annotations to satisfy.
disable_error_code = [
    "attr-defined",
    "no-any-return",
    "arg-type",
    "var-annotated",
    "assignment",
]

[[tool.mypy.overrides]]
module = [
    "app.tests.*",
    "app.modules.*.tests.*",
]
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["app/tests"]
pythonpath = ["."]
