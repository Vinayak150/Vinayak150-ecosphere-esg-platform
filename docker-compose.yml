services:
  postgres:
    image: postgres:16-alpine
    container_name: ecosphere-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecosphere
      POSTGRES_PASSWORD: ecosphere
      POSTGRES_DB: ecosphere
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecosphere -d ecosphere"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecosphere-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://ecosphere:ecosphere@postgres:5432/ecosphere
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecosphere-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
